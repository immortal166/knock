name: Build APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.3.3-bin.zip
          unzip -q gradle-7.3.3-bin.zip
          echo "$PWD/gradle-7.3.3/bin" >> $GITHUB_PATH

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Create gradle.properties
        working-directory: ./anu/AnuragAlert
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Build Debug APK
        working-directory: ./anu/AnuragAlert
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AlertSystem
          path: anu/AnuragAlert/app/build/outputs/apk/debug/app-debug.apk
